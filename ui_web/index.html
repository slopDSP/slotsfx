<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlotsFX - Live Neural Multi-Effects Processor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="slotsfx-loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#111;color:#fff;font-family:system-ui, sans-serif;z-index:9998;">
      <div style="text-align:center;max-width:600px;">
        <h1 style="margin:0;font-size:2rem;">SLOTSFX UI LOADING</h1>
        <p style="margin:0.75rem 0 0;opacity:0.8;">If this screen stays visible, the UI assets failed to load.</p>
      </div>
    </div>
    <div id="app"></div>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const loadEl = document.getElementById('slotsfx-loading');
        if (loadEl) {
          setTimeout(() => {
            if (document.getElementById('app') && document.getElementById('app').children.length > 0) {
              loadEl.style.display = 'none';
            }
          }, 1000);
        }
      });
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
